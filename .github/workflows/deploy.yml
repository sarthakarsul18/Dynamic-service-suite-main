name: Deploy React App to EC2 (Backup + Rollback Ready)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}

          script: |

              echo "Starting deployment..."

              IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d_%I-%M-%S_%p")

              BACKUP_DIR="/var/backups/react-site/backup_${IST_TIME}_IST"

              echo "Creating backup directory..."

              sudo mkdir -p "$BACKUP_DIR"

              echo "Creating backup of current live site..."

              sudo rsync -av \
              /var/www/html/ \
              "$BACKUP_DIR/"

              echo "Backup created successfully at $BACKUP_DIR"

              echo "Updating project repository..."

              cd /var/www/Dynamic-service-suite-main

              git fetch --all
              git reset --hard origin/master

              echo "Installing dependencies..."

              npm install

              echo "Cleaning old build..."

              rm -rf dist

              echo "Building React app..."

              npm run build

              echo "Deploying new build to Apache directory..."

              sudo cp -r dist/* /var/www/html/

              echo "Restarting Apache server..."

              sudo systemctl restart httpd

              echo "Deployment completed successfully at $IST_TIME"
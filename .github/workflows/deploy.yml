name: Deploy React App to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}

          script: |

              echo "Starting deployment..."

              IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d_%I-%M-%S_%p")

              BACKUP_DIR="/var/www/html/backups/backup_${IST_TIME}_IST"

              echo "Creating backup..."

              mkdir -p "$BACKUP_DIR"

              rsync -av --exclude='backups' \
              /var/www/html/ \
              "$BACKUP_DIR/"

              echo "Backup created at $BACKUP_DIR"

              echo "Updating project repository..."

              cd /var/www/Dynamic-service-suite-main

              git fetch --all
              git reset --hard origin/master

              echo "Installing dependencies..."

              npm install

              echo "Building React app..."

              rm -rf dist
              npm run build

              echo "Deploying build..."

              sudo cp -r dist/* /var/www/html/

              echo "Restarting Apache..."

              sudo systemctl restart httpd

              echo "Deployment completed successfully at $IST_TIME"